# fly.toml app configuration file generated for gxktm-web-app on 2026-03-24T02:53:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gxktm-web-app'
primary_region = 'ord'

[build]
  [build.args]
    NEXT_PUBLIC_EXAMPLE = 'Value goes here'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
